<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#00072d" media="(prefers-color-scheme: dark)" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

      content="camera=(), microphone=(), geolocation=(), interest-cohort=()"

    <!-- Apple / Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Crashed Plane" />

    <!-- Icons & Manifest -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/icon-pinned-tab.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon-pinned-tab.svg" color="#0e6ba8" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Help, I crashed my plane!" />

      content="Help navigating NTSB 830, for when you crash your plane"

      property="og:image:alt"
      content="Stylized icon of a plane nose-down, representing the Help, I crashed my plane! site"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:url" content="https://icrashedmyplane.com/" />
    <meta property="twitter:title" content="Help, I crashed my plane!" />
    <meta
      property="twitter:description"
      content="Help navigating NTSB 830, for when you crash your plane"
    />
    <meta property="twitter:image" content="https://icrashedmyplane.com/icon-pinned-tab.svg" />
    <meta
      property="twitter:image:alt"
      content="Stylized icon of a plane nose-down, representing the Help, I crashed my plane! site"
    />

    <link rel="canonical" href="https://icrashedmyplane.com/" />

          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
